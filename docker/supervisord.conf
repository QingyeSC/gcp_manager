# docker/supervisord.conf - Root权限版本
[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/app/logs

[program:monitor]
command=python /app/scripts/monitor.py
directory=/app
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/app/logs/monitor.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

[program:web_panel]
command=python /app/app.py
directory=/app
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/app/logs/web_panel.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

[program:scheduler]
command=python /app/scripts/scheduler.py
directory=/app
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/app/logs/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
